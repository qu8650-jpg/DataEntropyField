<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Entropy Field</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: black;
      }
      #ui {
        position: absolute;
        bottom: 20px;
        left: 20px;
        z-index: 10;
      }
      #dataInput {
        background: transparent;
        border: 1px solid #444;
        color: white;
        padding: 10px;
        width: 300px;
        font-family: monospace;
      }
      #title {
        position: absolute;
        top: 20px;
        left: 20px;
        color: white;
        font-family: monospace;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div id="title">數位熵場域 (Data Entropy Field)</div>
    <div id="ui">
      <input type="text" id="dataInput" placeholder="輸入數據以擾動星雲..." />
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getDatabase,
        ref,
        push,
        onChildAdded,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

      // --- 1. Firebase 連線設定 ---
      const firebaseConfig = {
        apiKey: "AIzaSyAzZwWB9CsqadUAsboqGeq898FYxH50N5K",
        authDomain: "dataentropy-e3b87.firebaseapp.com",
        projectId: "dataentropy-e3b87",
        storageBucket: "dataentropy-e3b87.appspot.com",
        messagingSenderId: "401028674174",
        appId: "1:401028674174:web:411cf5b8f7a6f7b2bele2f",
        measurementId: "G-053MQ1V2LV",
      };
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const textRef = ref(db, "particles");

      // --- 2. 場景初始化 ---
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        85,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);
      const controls = new THREE.OrbitControls(camera, renderer.domElement);

      function createCharTexture(char) {
        const canvas = document.createElement("canvas");
        canvas.width = 128;
        canvas.height = 128;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "white";
        ctx.font = "bold 80px monospace";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(char, 64, 64);
        return new THREE.CanvasTexture(canvas);
      }

      const sprites = [];

      function spawnTextParticle(char) {
        const tex = createCharTexture(char);
        const sprite = new THREE.Sprite(
          new THREE.SpriteMaterial({
            map: tex,
            transparent: true,
            blending: THREE.AdditiveBlending,
          }),
        );

        sprite.userData = {
          radius: Math.random() * 15 + 3,
          phi: Math.random() * Math.PI * 2,
          theta: Math.acos(2 * Math.random() - 1),
          speed: 0.008 + Math.random() * 0.005,
          noiseSeed: Math.random() * 100,
          noiseFreq: 0.02 + Math.random() * 0.03,
        };

        sprite.scale.set(0.2, 0.2, 1);
        scene.add(sprite);
        sprites.push(sprite);
      }

      // --- 3. 互動邏輯 ---
      const inputField = document.getElementById("dataInput");
      inputField.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && inputField.value) {
          const text = inputField.value;
          for (let char of text) {
            push(textRef, { char: char });
          }
          inputField.value = "";
        }
      });

      // --- 4. 監聽雲端同步 ---
      onChildAdded(textRef, (snapshot) => {
        const data = snapshot.val();
        if (data && data.char) spawnTextParticle(data.char);
      });

      // --- 5. 動畫循環 ---
      camera.position.set(0, 5, 25);
      function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.001;
        sprites.forEach((p) => {
          p.userData.phi += p.userData.speed;
          const noise =
            Math.sin(time * 3 + p.userData.noiseSeed) *
            p.userData.noiseFreq *
            150;
          const r = p.userData.radius;
          const phi = p.userData.phi + noise * 0.01;
          const theta = p.userData.theta + noise * 0.01;
          p.position.set(
            r * Math.sin(theta) * Math.cos(phi),
            r * Math.sin(theta) * Math.sin(phi),
            r * Math.cos(theta),
          );
          p.material.opacity =
            0.5 + Math.sin(time * 5 + p.userData.noiseSeed) * 0.3;
        });
        controls.update();
        renderer.render(scene, camera);
      }
      animate();
    </script>
  </body>
</html>
