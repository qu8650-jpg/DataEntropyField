<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Entropy Field</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: black;
      }
      #startAudio {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: transparent;
        color: white;
        border: 1px solid white;
        padding: 20px 40px;
        cursor: pointer;
        font-family: monospace;
        font-size: 20px;
        z-index: 999;
      }
      #ui {
        position: absolute;
        bottom: 80px; /* 距離底部 80px */
        left: 50%;
        transform: translateX(-50%); /* 強制水平置中 */
        z-index: 10;
      }
      #dataInput {
        padding: 15px 25px;
        width: 600px; /* 設定寬度 */
        height: 50px; /* 設定高度 */
        background: rgba(255, 255, 255, 0.05); /* 微透明背景 */
        border: 1px solid rgba(255, 255, 255, 0.3); /* 細緻邊框 */
        color: white;
        font-family: "Courier New", monospace;
        font-size: 20px; /* 字體放大 */
        outline: none; /* 移除點擊時的藍框 */
        border-radius: 4px; /* 微圓角 */
      }
      #floatingText {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 50px;
        font-family: monospace;
        pointer-events: none;
        z-index: 100;
        opacity: 0;
      }
      #wall-container {
        position: absolute;
        top: 50px;
        right: 40px;
        width: 350px;
        height: 85vh;
        overflow: hidden;
        pointer-events: none;
        z-index: 5;
      }
      #right-wall {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        text-align: right;
      }
      .comment {
        color: white;
        font-family: monospace;
        margin-top: 10px;
        opacity: 0;
        transform: translateY(-20px);
        transition: all 0.5s ease-out;
        font-size: 16px;
        word-wrap: break-word;
        text-align: right;
        width: 100%;
      }
      @keyframes slideIn {
        0% {
          opacity: 0;
          transform: translate(-50%, -150%);
        }
        100% {
          opacity: 1;
          transform: translate(-50%, -50%);
        }
      }
    </style>
  </head>
  <body>
    <button id="startAudio">INIT DATA STREAM</button>
    <div id="floatingText"></div>
    <div id="wall-container"><div id="right-wall"></div></div>
    <div id="ui">
      <input type="text" id="dataInput" placeholder="輸入文字並按 Enter..." />
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script type="module" src="script.js"></script>
  </body>
</html>
